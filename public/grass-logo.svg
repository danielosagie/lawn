<?xml version="1.0" encoding="UTF-8"?>
<!--
  snip brand mark — Lucide Film icon on the snip orange. Matches the
  favicon (public/favicon.svg) so the favicon, the macOS app icon
  (resources/icon.icns is generated from this file by
  desktop/scripts/generate-dmg-assets.sh), and any in-product logo
  surface share one identity. Filename is kept as `grass-logo.svg`
  because static references to that path are scattered through the
  codebase — replace the contents, not the path. (Older versions of
  this file rendered a palm-tree mark; that design is retired.)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" aria-label="snip">
  <rect width="1024" height="1024" fill="#FF6600" />
  <!--
    Lucide Film icon, 24×24 viewBox, scaled 32× and translated so the
    18×18 inner frame sits centered with ~128px padding around it.
  -->
  <g
    fill="none"
    stroke="#f0f0e8"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
    transform="translate(128 128) scale(32)"
  >
    <rect width="18" height="18" x="3" y="3" rx="2" />
    <path d="M7 3v18" />
    <path d="M3 7.5h4" />
    <path d="M3 12h18" />
    <path d="M3 16.5h4" />
    <path d="M17 3v18" />
    <path d="M17 7.5h4" />
    <path d="M17 16.5h4" />
  </g>
</svg>
