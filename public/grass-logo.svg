<?xml version="1.0" encoding="UTF-8"?>
<!-- snip mark: palm tree on a sand horizon — beach replaces the grass blade. -->
<svg width="1200" height="1200" viewBox="0 0 1200 1200" xmlns="http://www.w3.org/2000/svg">
  <!-- Sun behind the palm -->
  <circle cx="600" cy="430" r="170" fill="#FF6600"/>

  <!-- Palm fronds (six rays out from the top of the trunk) -->
  <g fill="none" stroke="#1a1a1a" stroke-width="48" stroke-linecap="round">
    <path d="M620 540 C520 460 380 440 260 470"/>
    <path d="M620 540 C540 410 460 320 360 270"/>
    <path d="M620 540 C620 410 660 280 700 200"/>
    <path d="M620 540 C720 420 860 360 980 360"/>
    <path d="M620 540 C740 540 880 590 970 660"/>
    <path d="M620 540 C520 580 420 660 360 760"/>
  </g>

  <!-- Coconuts -->
  <circle cx="610" cy="540" r="34" fill="#1a1a1a"/>
  <circle cx="660" cy="525" r="26" fill="#1a1a1a"/>
  <circle cx="565" cy="525" r="22" fill="#1a1a1a"/>

  <!-- Trunk -->
  <path d="M620 540 C610 700 600 850 615 1020 L660 1020 C660 850 660 700 660 540 Z" fill="#1a1a1a"/>

  <!-- Sand / horizon -->
  <rect x="0" y="1020" width="1200" height="180" fill="#FF6600"/>
</svg>
